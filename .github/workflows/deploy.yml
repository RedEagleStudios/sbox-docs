name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # daily at 6am UTC
  workflow_dispatch:
    inputs:
      api_url:
        description: 'API JSON URL (e.g. https://cdn.sbox.game/releases/2026-04-02-21-06-53.zip.json)'
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Fetch API data
        env:
          DEFAULT_URL: "https://cdn.sbox.game/releases/2026-04-02-21-06-53.zip.json"
        run: |
          URL="${{ inputs.api_url || env.DEFAULT_URL }}"
          echo "Fetching API data from: $URL"
          curl -sfL "$URL" -o api-data.json
          echo "Downloaded api-data.json ($(wc -c < api-data.json) bytes)"
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
